<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yorenster Math AI</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: black;
    color: white;
    overflow: hidden;
}

/* BOOT */
#bootScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    color: cyan;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    text-shadow: 0 0 10px cyan;
}

/* BACKGROUND */
.glow-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.circle {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.7;
}

.c1 { background: cyan; top: 10%; left: 10%; }
.c2 { background: red; bottom: 10%; right: 10%; }

/* HEADER */
header {
    text-align: center;
    padding: 10px;
    font-size: 20px;
    text-shadow: 0 0 10px cyan;
}

/* CHAT */
#chat {
    height: calc(100vh - 120px);
    overflow-y: auto;
    padding: 10px;
}

.msg {
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 70%;
    white-space: pre-wrap;
}

.user { background: #2b6cff; margin-left: auto; }
.ai { background: #222; }

/* INPUT */
#inputBar {
    display: flex;
    padding: 10px;
    background: #111;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: white;
}

button {
    margin-left: 8px;
    padding: 10px;
    background: #2b6cff;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="bootScreen">
    <h1>YORENSTER MATH AI</h1>
    <p id="bootText">Initializing System...</p>
</div>

<!-- BACKGROUND -->
<div class="glow-bg">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
</div>

<header>📐 YORENSTER MATH AI</header>

<div id="chat"></div>

<div id="inputBar">
    <input id="text" placeholder="Write any question" />
    <button onclick="sendMsg()">Solve</button>
</div>

<script>

/* BOOT */
let bootMessages = [
    "Initializing Math Engine...",
    "Loading AI Brain...",
    "Connecting System...",
    "Ready ✔"
];

let i = 0;
let bootText = document.getElementById("bootText");

let bootInterval = setInterval(() => {
    bootText.innerText = bootMessages[i];
    i++;
    if (i >= bootMessages.length) clearInterval(bootInterval);
}, 700);

setTimeout(() => {
    document.getElementById("bootScreen").style.display = "none";
}, 3000);

/* CHAT */
let chat = document.getElementById("chat");

function addMsg(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

/* SEND */
function sendMsg() {
    let input = document.getElementById("text");
    let text = input.value;
    if (!text.trim()) return;

    addMsg("❓ " + text, "user");

    setTimeout(() => {
        addMsg(aiBrain(text), "ai");
    }, 300);

    input.value = "";
}

/* AI BRAIN */
function aiBrain(text) {
    text = text.toLowerCase().trim();

    // WORD → SYMBOL CONVERSION
    text = text
        .replace(/plus/g, "+")
        .replace(/add/g, "+")
        .replace(/minus/g, "-")
        .replace(/subtract/g, "-")
        .replace(/multiply by/g, "*")
        .replace(/divided by/g, "/")
        .replace(/divide by/g, "/")
        .replace(/x/g, "*")
        .replace(/×/g, "*")
        .replace(/÷/g, "/");

    text = text.replace(/\s+/g, "");

    // MATH CALCULATION
    if (/^[0-9+\-*/().]+$/.test(text)) {
        try {
            let result = Function('"use strict"; return (' + text + ')')();
            return "🧮 Result: " + result;
        } catch {
            return "❌ Invalid calculation";
        }
    }

    // CONCEPTS
    if (text.includes("multiply")) return "✖ Multiplication = repeated addition.";
    if (text.includes("divide")) return "➗ Division = splitting equally.";
    if (text.includes("add")) return "➕ Addition = combining numbers.";
    if (text.includes("subtract")) return "➖ Subtraction = difference between numbers.";

    return "📘 Ask any math question.";
}

</script>

</body>
</html>
